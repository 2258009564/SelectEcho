name: Release ZIP

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build ZIP package
        run: |
          mkdir -p dist
          zip -r dist/SelectEcho.zip . \
            -x ".git/*" \
               ".github/*" \
               "dist/*"

      - name: Create GitHub Release and upload ZIP
        uses: softprops/action-gh-release@v2
        with:
          name: SelectEcho ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/SelectEcho.zip
